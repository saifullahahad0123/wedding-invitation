<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

</head>
<body>

<!-- Opening Screen -->

<div id="cover">

<div class="envelope">

<div class="flap"></div>

<div class="letter">
💌
</div>

</div>

<h2>Click to Open Invitation</h2>

</div>

<!-- Invitation -->

<div id="card">

<h1>💍 Wedding Invitation 💍</h1>

<h2>Dear Friend</h2>

<p>
You are warmly invited to the wedding ceremony
of my beloved sister.
</p>

<h3>👰 Ayesha</h3>

<p>Weds</p>

<h3>🤵 Ahmad</h3>

<h4>15 December 2026</h4>

<h4>7:00 PM</h4>

<h4>Srinagar</h4>

<p>
Your presence will make our celebration more special ❤️
</p>

</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
